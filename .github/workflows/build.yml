name: Build Windows .exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install ttkbootstrap matplotlib openpyxl pillow pyinstaller
    
    - name: Build .exe with icon
      run: |
        Get-ChildItem -Name
        pyinstaller --onefile --windowed --icon=屎哥.ico --name "保本ROI计算器增强版_屎哥版" "保本ROI计算器_增强版 (1).py"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-exe
        path: dist/保本ROI计算器增强版_屎哥版.exe
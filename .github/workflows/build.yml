name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Rename file (remove parentheses)
      run: |
        Get-ChildItem -Name | Select-String '\('
        Rename-Item "保本ROI计算器_增强版 (1).py" "保本ROI计算器_增强版.py" 2>$null
        Get-ChildItem | Select-Object Name
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install ttkbootstrap matplotlib openpyxl pillow
    
    - name: Build .exe with icon
      run: |
        pyinstaller --onefile --windowed --icon=屎哥.ico --name "保本ROI计算器增强版_屎哥版" "保本ROI计算器_增强版.py"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-exe
        path: dist/保本ROI计算器增强版_屎哥版.exe